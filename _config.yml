# Configurazione del sito
title: Giulia Miculan
email: giulia@miculan.org
description: >-
  Archivist and project manager for art collections and artist archives.
  Documenting, managing and enhancing artistic legacies in Italy and abroad.
baseurl: ""
url: "https://giuliamiculan.github.io"

# Informazioni personali
author:
  name: Giulia Miculan
  title: Archivist & Project Manager
  bio: Documenting, managing and enhancing art collections and artist archives.
  location: Udine, Italy
  birth_place: Udine, 1998
  vat: IT03178490300
  phone: "+39 3476749008"
  
# Social media
social:
  linkedin: giulia-miculan
  email: giulia@miculan.org

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Collections
collections:
  projects:
    output: true
    permalink: /progetti/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"

# Esclusioni
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
